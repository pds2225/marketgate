services:
  - type: web
    name: marketgate-api
    env: python
    runtime: python3
    region: singapore
    rootDir: services/p1-export-fit-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: UVICORN_WORKERS
        value: "4"
    healthCheckPath: /health
    autoDeploy: true
